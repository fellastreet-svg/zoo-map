<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: scroll; 
            background: #f0f0f0;
            display: flex;
            justify-content: center;
        }
        #mapImage { 
            transition: transform 0.2s ease; 
            transform-origin: center;
            width: 200vw; /* Set larger than screen so it can pan */
            height: auto;
        }
    </style>
</head>
<body>
    <img id="mapImage" src="download.png">

    <script>
        let currentZoom = 1;

        window.addEventListener('message', function(event) {
            let map = document.getElementById('mapImage');
            
            // ZOOM CONTROLS
            if (event.data === 'zoom_in') {
                currentZoom += 0.2;
                map.style.transform = `scale(${currentZoom})`;
            }
            if (event.data === 'zoom_out' && currentZoom > 0.5) {
                currentZoom -= 0.2;
                map.style.transform = `scale(${currentZoom})`;
            }

            // DIRECTIONAL MOVEMENT (X, Y)
            if (event.data === 'move_up')          { window.scrollBy(0, -100); }
            if (event.data === 'move_down')        { window.scrollBy(0, 100); }
            if (event.data === 'move_left')        { window.scrollBy(-100, 0); }
            if (event.data === 'move_right')       { window.scrollBy(100, 0); }
            
            // CORNER MOVEMENT
            if (event.data === 'move_topleft')     { window.scrollBy(-100, -100); }
            if (event.data === 'move_topright')    { window.scrollBy(100, -100); }
            if (event.data === 'move_bottomleft')  { window.scrollBy(-100, 100); }
            if (event.data === 'move_bottomright') { window.scrollBy(100, 100); }
        });
    </script>
</body>
</html>
